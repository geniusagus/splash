<head>
    <meta charset="UTF-8">

    <title>Comparativa Splash A, B y C</title>
    <style>
        body {
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 40px;
            min-height: 100vh;
            background-color: #222;
            color: white;
            font-family: sans-serif;
            flex-wrap: wrap;
        }

        .wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
        }

        .splash {
            width: 360px;
            height: 800px;
            background-color: #C61C18;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        svg {
            width: 280px;
            height: auto;
        }

        /* --- ANIMACIONES GLOBALES CUADRADOS --- */
        .square {
            fill: #ffffff;
            opacity: 0;
            transform-origin: center;
            transform-box: fill-box;
            animation: popIn 0.4s ease forwards;
        }

        @keyframes popIn {
            from {
                opacity: 0;
                transform: scale(0.5);
            }

            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        /* --- OPCIÓN B (Deslizamiento de grupo más fluido) --- */
        #opcion-b .sq1 {
            animation-delay: 0.1s;
        }

        #opcion-b .sq2 {
            animation-delay: 0.3s;
        }

        #opcion-b .sq3 {
            animation-delay: 0.5s;
        }

        #opcion-b .sq4 {
            animation-delay: 0.7s;
        }

        #opcion-b .squares-group {
            transform: translateX(200px);
            /* Curva más suave y mayor duración para evitar cortes bruscos */
            animation: moveLeftB 0.8s cubic-bezier(0.25, 1, 0.5, 1) forwards;
            animation-delay: 1.0s;
            /* Se solapa levemente con el final del último cuadrado */
        }

        #opcion-b .text-group path {
            fill: #ffffff;
            opacity: 0;
            /* Aparece acompañando el final del movimiento de los cuadrados */
            animation: fadeInB 0.9s cubic-bezier(0.25, 1, 0.5, 1) forwards;
            animation-delay: 1.3s;
            /* Termina exactamente a los 2.2s */
        }

        @keyframes moveLeftB {
            from {
                transform: translateX(200px);
            }

            to {
                transform: translateX(0);
            }
        }

        @keyframes fadeInB {
            from {
                opacity: 0;
                transform: translateX(-30px);
            }

            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

    </style>
</head>
